<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Task Tracker</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

  <body 
        class="min-h-screen bg-cover bg-center bg-no-repeat bg-black"
        style="background-image: url('./images/background.jpg');"
>

  <!-- Navbar -->
  <nav class="bg-blue-600 text-white p-4 shadow-md">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold">Task Tracker</h1>
    </div>
    

  </nav>

  <!-- Hero Section -->
  <section class="text-center py-10 bg-white shadow-sm">
    <h2 class="text-4xl font-bold text-gray-800">
      Manage Your Student Tasks Easily
    </h2>

    <p class="mt-3 text-gray-600">
      Add, track, and complete your daily academic tasks.
    </p>
  </section>

  <!-- Task Form -->
  <section class="container mx-auto px-4 py-10">

    <div class="bg-white p-6 rounded-xl shadow-md max-w-xl mx-auto">

      <h3 class="text-2xl font-semibold mb-5 text-center">
        Add New Task
      </h3>

      <form id="taskForm" class="space-y-4">

         <!-- Task Name -->
        <input
          type="text"
          id="taskInput"
          placeholder="Enter task name"
          class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <!-- Due Date -->
        <input
          type="date"
          id="dateInput"
          class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
        />

        <!-- Error Message -->
        <p id="errorMessage" class="text-red-500 text-sm hidden">
          Please fill in all fields.
        </p>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg transition duration-300"
        >
          Add Task
        </button>

      </form>
    </div>

    <!-- Task Display Area -->
    <div
      id="taskContainer"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10"
    >
    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
